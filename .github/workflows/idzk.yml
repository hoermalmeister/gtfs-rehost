name: Daily GTFS Rehost - IDZK

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    env:
      FEED_FOLDER: idzk
      FILE_NAME: id-zk-all.zip
      FEED_URL: https://dataportal-files.bileto.net/id-zk-all.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NEW: Setup Python and Pandas ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas
      # ------------------------------------

      - name: Download and extract GTFS
        run: |
          mkdir -p ${{ env.FEED_FOLDER }}
          cd ${{ env.FEED_FOLDER }}
          
          echo "Downloading ${{ env.FILE_NAME }}..."
          curl -k -L -o ${{ env.FILE_NAME }} ${{ env.FEED_URL }}
          
          echo "Unzipping..."
          unzip -o ${{ env.FILE_NAME }}

      - name: Check feed expiry
        run: |
          # Move into the feed's folder
          cd ${{ env.FEED_FOLDER }}
          
          # Run the universal script, passing the feed folder name as an argument
          echo "Checking expiration date..."
          python $GITHUB_WORKSPACE/.github/scripts/check_expiry.py ${{ env.FEED_FOLDER }}

      - name: Notify via GitHub Issue
        # Check if the Python script created an alert file in the root workspace
        if: hashFiles('expiry_alert.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Automated Alert: ${{ env.FEED_FOLDER }} GTFS Feed Expiring"
          # Adding the @mention just like your website monitors!
          BODY="@hoermalmeister - Action required! $(cat expiry_alert.txt)"
          
          # Check if an alert issue is ALREADY open for this specific feed
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number -q '.[0].number')
          
          if [ -z "$EXISTING" ]; then
            echo "Creating new issue..."
            gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "Alert already open (Issue #$EXISTING). Skipping spam."
          fi
          
          # Delete the alert file so it doesn't accidentally get committed
          rm expiry_alert.txt

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage only the folder specific to this feed
          git add ${{ env.FEED_FOLDER }}/
          
          if git diff --staged --quiet; then
            echo "No changes detected in ${{ env.FEED_FOLDER }} today."
          else
            git commit -m "Automated update of ${{ env.FEED_FOLDER }} GTFS feed"
            git push
          fi
