name: Daily GTFS Rehost - Cotral

on:
  schedule:
    # Runs at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: 

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    env:
      FEED_FOLDER: cotral
      FILE_NAME: cotral.zip
      FEED_URL: https://travel.mob.cotralspa.it:4443/GTFS/GTFS_COTRAL.zip 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Download and extract GTFS
        run: |
          mkdir -p ${{ env.FEED_FOLDER }}
          cd ${{ env.FEED_FOLDER }}
          
          echo "Downloading ${{ env.FILE_NAME }}..."
          curl -k -L -o ${{ env.FILE_NAME }} ${{ env.FEED_URL }}
          
          echo "Unzipping temporarily for expiry check..."
          unzip -o ${{ env.FILE_NAME }}

      - name: Check feed expiry
        run: |
          cd ${{ env.FEED_FOLDER }}
          echo "Checking expiration date..."
          python $GITHUB_WORKSPACE/.github/scripts/check_expiry.py ${{ env.FEED_FOLDER }}

      - name: Notify via GitHub Issue
        if: hashFiles('expiry_alert.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Automated Alert: ${{ env.FEED_FOLDER }} GTFS Feed Expiring"
          BODY="@hoermalmeister - Action required! $(cat expiry_alert.txt)"
          
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number -q '.[0].number')
          
          if [ -z "$EXISTING" ]; then
            echo "Creating new issue..."
            gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "Alert already open (Issue #$EXISTING). Skipping spam."
          fi
          
          rm expiry_alert.txt

      - name: Clean up unzipped files (Bypass GitHub Limit)
        run: |
          # Move into the feed folder
          cd ${{ env.FEED_FOLDER }}
          
          # Delete EVERY text file so we don't hit the 100MB limit. 
          # Only cotral.zip will remain in this folder.
          echo "Cleaning up text files..."
          rm -f *.txt

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the folder (which now only contains the .zip)
          git add ${{ env.FEED_FOLDER }}/
          
          if git diff --staged --quiet; then
            echo "No changes detected in ${{ env.FEED_FOLDER }} today."
          else
            git commit -m "Automated update of ${{ env.FEED_FOLDER }} GTFS feed (Zip only)"
            git push
          fi
